<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать </title>
</head>
<body>
<div class="container">
    <h1>Редактировать </h1>

    <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form th:action="@{/decks/{deckId}/cards/{cardId}/edit(deckId=${deck.id}, cardId=${card.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="text" name="newFrontText" th:value="${card.frontText}" required />
        <input type="text" name="newBackText" th:value="${card.backText}" required />
        <input type="text" name="newExampleSentence" th:value="${card.exampleSentence}" required />

        <button type="submit">Сохранить изменения</button>
    </form>

    <a th:href="@{/list}">← Назад к списку </a>
</div>
</body>
</html>
